# ══════════════════════════════════════════════════════════════
#  docker-compose.prod.yml — بيئة الإنتاج
#  تشغيل: docker compose -f docker-compose.prod.yml up -d
#  يستخدم: PostgreSQL + Gunicorn + Nginx + SSL
# ══════════════════════════════════════════════════════════════

services:

  # ── قاعدة البيانات PostgreSQL ────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── تطبيق Django عبر Gunicorn ────────────────────────────────
  web:
    build: .
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             gunicorn core.wsgi:application --config gunicorn.conf.py"
    volumes:
      - static_files:/app/staticfiles
      - media_data:/app/media
      - log_data:/app/logs
    env_file:
      - .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "8000"

  # ── Nginx (Reverse Proxy + Static Files + SSL) ───────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/app/staticfiles:ro
      - media_data:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # شهادات SSL
      - ./nginx/certbot/www:/var/www/certbot:ro # Let's Encrypt
    depends_on:
      - web
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  postgres_data:
  static_files:
  media_data:
  log_data:
