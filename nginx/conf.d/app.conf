# ══════════════════════════════════════════════════════════════
#  app.conf — Virtual Host للنظام
#  عدّل YOUR_DOMAIN.COM إلى اسم دومينك الحقيقي
# ══════════════════════════════════════════════════════════════

# ── إعادة التوجيه HTTP → HTTPS ───────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # إعادة توجيه كل شيء آخر لـ HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS الرئيسي ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # ── شهادات SSL ────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── إعدادات SSL الآمنة (حماية MITM) ─────────────────────
    # TLS 1.2 و 1.3 فقط — منع البروتوكولات القديمة الضعيفة
    ssl_protocols             TLSv1.2 TLSv1.3;

    # Ciphers قوية فقط — تدعم Perfect Forward Secrecy
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Session cache — أسرع وأكثر أماناً
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;             # منع هجمات إعادة استخدام الجلسة

    # OCSP Stapling — التحقق من شهادة SSL بدون كشف IP للعميل
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # DH Parameters قوية — منع هجوم Logjam
    # أنشئها بـ: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
    # ssl_dhparam               /etc/nginx/ssl/dhparam.pem;

    # ── Security Headers (حماية MITM والـ Downgrade) ─────────
    # HSTS — يمنع المتصفح من قبول HTTP نهائياً
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # منع تخمين نوع المحتوى
    add_header X-Content-Type-Options    "nosniff"                              always;

    # منع Clickjacking
    add_header X-Frame-Options           "DENY"                                 always;

    # XSS Protection
    add_header X-XSS-Protection          "1; mode=block"                        always;

    # لا نكشف URL الداخلية
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # تقييد صلاحيات المتصفح
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy — يمنع تحميل موارد من مصادر غير موثوقة
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://accounts.google.com; frame-src https://accounts.google.com;" always;

    # ── الملفات الثابتة (CSS, JS, Images) ────────────────────
    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── ملفات الوسائط (صور مرفوعة) ───────────────────────────
    location /media/ {
        alias   /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Django عبر Gunicorn ───────────────────────────────────
    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
        proxy_buffering        on;
        proxy_buffer_size      8k;
        proxy_buffers          8 8k;
    }

    # ── منع الوصول لملفات حساسة ──────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* \.(env|log|sqlite3|bat|sh|py|cfg|ini)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
