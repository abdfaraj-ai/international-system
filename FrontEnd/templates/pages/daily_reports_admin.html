{% extends 'layout/base.html' %}
{% load static %}

{% block title %}التقارير اليومية — الإدارة{% endblock %}

{% block extra_css %}
<style>
.dra-page { min-height: 100vh; background: var(--bg-primary); font-family: 'Cairo', sans-serif; padding: 24px; }
.dra-container { max-width: 1100px; margin: 0 auto; }

.dra-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.dra-head h1 { color: var(--text-primary, #f1f5f9); font-size: 1.4rem; font-weight: 800; }
.dra-head p  { color: var(--text-secondary, #94a3b8); font-size: 0.85rem; }

.dra-filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.dra-filter-btn {
  padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border-color, rgba(255,255,255,0.1));
  background: var(--bg-secondary, #1a2332); color: var(--text-secondary, #94a3b8);
  transition: all 0.2s; font-family: 'Cairo', sans-serif;
}
.dra-filter-btn.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

.dra-grid { display: grid; gap: 14px; }
.dra-card {
  background: var(--bg-secondary, #1a2332);
  border: 1px solid var(--border-color, rgba(255,255,255,0.08));
  border-radius: 14px; padding: 20px;
}
.dra-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.dra-emp { display: flex; align-items: center; gap: 10px; }
.dra-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 1rem;
}
.dra-emp-name { color: var(--text-primary, #f1f5f9); font-weight: 700; font-size: 0.95rem; }
.dra-emp-date { color: #60a5fa; font-size: 0.78rem; }

.dra-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
.dra-badge.pending  { background: rgba(251,191,36,0.15); color: #fbbf24; }
.dra-badge.reviewed { background: rgba(34,197,94,0.15);  color: #22c55e; }
.dra-badge.rejected { background: rgba(239,68,68,0.15);  color: #f87171; }

.dra-content {
  color: var(--text-primary, #e2e8f0); font-size: 0.9rem; line-height: 1.7;
  background: var(--bg-primary, #0f1c2e); padding: 14px 16px; border-radius: 10px;
  margin-bottom: 10px; white-space: pre-wrap;
}
.dra-notes {
  color: var(--text-secondary, #94a3b8); font-size: 0.82rem;
  padding: 8px 14px; border-right: 3px solid #64748b;
  background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 12px;
}
.dra-manager-note {
  color: #93c5fd; font-size: 0.82rem; padding: 8px 14px;
  border-right: 3px solid #3b82f6; background: rgba(59,130,246,0.08);
  border-radius: 6px; margin-bottom: 12px;
}

.dra-actions { display: flex; gap: 8px; }
.dra-btn {
  padding: 8px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
  cursor: pointer; border: none; font-family: 'Cairo', sans-serif; transition: opacity 0.2s;
}
.dra-btn:hover { opacity: 0.85; }
.dra-btn.approve { background: #16a34a; color: #fff; }
.dra-btn.reject  { background: #dc2626; color: #fff; }

.dra-empty { text-align: center; padding: 60px 20px; color: var(--text-secondary, #64748b); }
.dra-empty .icon { font-size: 3rem; margin-bottom: 12px; }

/* Modal */
.dra-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.dra-modal-overlay.show { display: flex; }
.dra-modal {
  background: var(--bg-secondary, #1a2332); border-radius: 16px; padding: 24px;
  width: 90%; max-width: 460px; border: 1px solid rgba(255,255,255,0.1);
}
.dra-modal h3 { color: #f1f5f9; margin-bottom: 16px; }
.dra-modal textarea {
  width: 100%; min-height: 90px; background: var(--bg-primary, #0f1c2e);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px;
  color: #f1f5f9; font-family: 'Cairo', sans-serif; resize: none; margin-bottom: 16px;
}
.dra-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

.dra-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  padding: 12px 24px; color: #f1f5f9; font-weight: 600; z-index: 9999;
  transition: transform 0.3s; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.dra-toast.show { transform: translateX(-50%) translateY(0); }
</style>
{% endblock %}

{% block content %}
<div class="dra-page">
  <div class="dra-container">
    <div class="dra-head">
      <div>
        <h1>📋 التقارير اليومية</h1>
        <p>مراجعة تقارير الموظفين</p>
      </div>
      <a href="/dashboard/" style="color:#60a5fa;text-decoration:none;font-size:0.9rem">← العودة للوحة التحكم</a>
    </div>

    <div class="dra-filters">
      <button class="dra-filter-btn active" data-status="" onclick="setFilter(this,'')">الكل</button>
      <button class="dra-filter-btn" data-status="pending" onclick="setFilter(this,'pending')">قيد المراجعة</button>
      <button class="dra-filter-btn" data-status="reviewed" onclick="setFilter(this,'reviewed')">تمت المراجعة</button>
      <button class="dra-filter-btn" data-status="rejected" onclick="setFilter(this,'rejected')">مرفوض</button>
    </div>

    <div class="dra-grid" id="reportsGrid">
      <div class="dra-empty"><div class="icon">⏳</div><p>جاري التحميل...</p></div>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div class="dra-modal-overlay" id="reviewModal">
  <div class="dra-modal">
    <h3 id="modalTitle">مراجعة التقرير</h3>
    <textarea id="managerNote" placeholder="أضف ملاحظة (اختياري)..."></textarea>
    <div class="dra-modal-actions">
      <button class="dra-btn reject" onclick="closeModal()" style="background:#475569">إلغاء</button>
      <button class="dra-btn approve" id="confirmBtn" onclick="confirmReview()">تأكيد</button>
    </div>
  </div>
</div>

<div class="dra-toast" id="toast"></div>

<script>
let currentFilter = '';
let pendingReview = { id: null, status: null };

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setFilter(btn, status) {
  document.querySelectorAll('.dra-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = status;
  loadReports();
}

async function loadReports() {
  const url = '/api/daily-report/all/' + (currentFilter ? `?status=${currentFilter}` : '');
  try {
    const res  = await fetch(url);
    const data = await res.json();
    const grid = document.getElementById('reportsGrid');

    if (!data.reports || data.reports.length === 0) {
      grid.innerHTML = `<div class="dra-empty"><div class="icon">📭</div><p>لا توجد تقارير</p></div>`;
      return;
    }

    grid.innerHTML = data.reports.map(r => {
      const initial = (r.employee || '?').charAt(0);
      return `
      <div class="dra-card">
        <div class="dra-card-top">
          <div class="dra-emp">
            <div class="dra-avatar">${initial}</div>
            <div>
              <div class="dra-emp-name">${r.employee}</div>
              <div class="dra-emp-date">📅 ${r.date} · ${r.createdAt}</div>
            </div>
          </div>
          <span class="dra-badge ${r.status}">${r.statusLabel}</span>
        </div>
        <div class="dra-content">${r.content}</div>
        ${r.notes ? `<div class="dra-notes">📝 ${r.notes}</div>` : ''}
        ${r.managerNote ? `<div class="dra-manager-note">💬 ${r.managerNote}</div>` : ''}
        ${r.status === 'pending' ? `
          <div class="dra-actions">
            <button class="dra-btn approve" onclick="openReview(${r.id},'reviewed')">✓ تمت المراجعة</button>
            <button class="dra-btn reject" onclick="openReview(${r.id},'rejected')">✗ رفض</button>
          </div>` : ''}
      </div>`;
    }).join('');
  } catch {
    document.getElementById('reportsGrid').innerHTML =
      `<div class="dra-empty"><p>تعذر تحميل التقارير</p></div>`;
  }
}

function openReview(id, status) {
  pendingReview = { id, status };
  document.getElementById('modalTitle').textContent =
    status === 'reviewed' ? 'تأكيد مراجعة التقرير' : 'رفض التقرير';
  document.getElementById('managerNote').value = '';
  document.getElementById('reviewModal').classList.add('show');
}

function closeModal() {
  document.getElementById('reviewModal').classList.remove('show');
}

async function confirmReview() {
  const note = document.getElementById('managerNote').value.trim();
  const btn  = document.getElementById('confirmBtn');
  btn.disabled = true;

  try {
    const res = await fetch(`/api/daily-report/${pendingReview.id}/review/`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ status: pendingReview.status, note }),
    });
    const data = await res.json();
    if (data.success) {
      showToast('✅ تم تحديث التقرير');
      closeModal();
      loadReports();
    } else {
      showToast('❌ ' + (data.error || 'حدث خطأ'));
    }
  } catch {
    showToast('❌ تعذر الاتصال بالسيرفر');
  } finally {
    btn.disabled = false;
  }
}

loadReports();
</script>
{% endblock %}
