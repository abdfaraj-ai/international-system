<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(10px);
  }
  h2 { text-align: center; margin-bottom: 8px; font-size: 1.5rem; }
  p.sub { text-align: center; color: #94a3b8; margin-bottom: 28px; font-size: 0.9rem; }
  label { display: block; margin-bottom: 6px; color: #cbd5e1; font-size: 0.9rem; }
  input[type=password] {
    width: 100%;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1rem;
    margin-bottom: 16px;
    outline: none;
  }
  input[type=password]:focus { border-color: #3b82f6; }
  button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg {
    margin-top: 16px;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-size: 0.9rem;
    display: none;
  }
  .msg.success { background: rgba(34,197,94,0.15); border: 1px solid #22c55e; color: #86efac; }
  .msg.error   { background: rgba(239,68,68,0.15);  border: 1px solid #ef4444; color: #fca5a5; }
</style>
</head>
<body>
<div class="card">
  <h2>🔐 إعادة تعيين كلمة المرور</h2>
  <p class="sub">أدخل كلمة المرور الجديدة</p>
  <label>كلمة المرور الجديدة</label>
  <input type="password" id="pass1" placeholder="••••••••" />
  <label>تأكيد كلمة المرور</label>
  <input type="password" id="pass2" placeholder="••••••••" />
  <button id="btn" onclick="submit()">تغيير كلمة المرور</button>
  <div class="msg" id="msg"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.querySelector('.card').innerHTML = '<p style="text-align:center;color:#f87171;">رابط غير صالح أو منتهي الصلاحية</p>';
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = 'msg ' + type;
    el.style.display = 'block';
  }

  async function submit() {
    const pass1 = document.getElementById('pass1').value.trim();
    const pass2 = document.getElementById('pass2').value.trim();
    const btn   = document.getElementById('btn');

    if (!pass1 || !pass2) return showMsg('يرجى ملء جميع الحقول', 'error');
    if (pass1 !== pass2)   return showMsg('كلمتا المرور غير متطابقتين', 'error');
    if (pass1.length < 6)  return showMsg('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');

    btn.disabled    = true;
    btn.textContent = 'جارٍ الحفظ...';

    try {
      const res  = await fetch('/api/reset-password/', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ token, password: pass1 }),
      });
      const data = await res.json();
      if (data.success) {
        showMsg('✅ تم تغيير كلمة المرور بنجاح — سيتم توجيهك لصفحة تسجيل الدخول', 'success');
        setTimeout(() => window.location.href = '/login/', 2500);
      } else {
        showMsg(data.error || 'حدث خطأ', 'error');
        btn.disabled    = false;
        btn.textContent = 'تغيير كلمة المرور';
      }
    } catch {
      showMsg('تعذر الاتصال بالسيرفر', 'error');
      btn.disabled    = false;
      btn.textContent = 'تغيير كلمة المرور';
    }
  }
</script>
</body>
</html>
